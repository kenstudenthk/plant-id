<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 125" fill="none">
    <!-- 仙人掌 Cactus - 柱状带侧臂 -->
    <!-- 主干 -->
    <path d="M50 76 L50 28" stroke="#7A9A70" stroke-width="7" stroke-linecap="round" />
    <!-- 左臂 -->
    <path d="M50 52 Q37 48 33 39 Q35 30 42 34 L44 52" stroke="#7A9A70" stroke-width="5"
        stroke-linecap="round" fill="none" />
    <!-- 右臂 -->
    <path d="M50 45 Q63 41 67 32 Q65 23 58 27 L56 45" stroke="#7A9A70" stroke-width="5"
        stroke-linecap="round" fill="none" />
    <!-- 主干刺 -->
    <line x1="46" y1="38" x2="41" y2="33" stroke="#5A7A50" stroke-width="1"
        stroke-linecap="round" />
    <line x1="54" y1="38" x2="59" y2="33" stroke="#5A7A50" stroke-width="1"
        stroke-linecap="round" />
    <line x1="46" y1="50" x2="41" y2="46" stroke="#5A7A50" stroke-width="1"
        stroke-linecap="round" />
    <line x1="54" y1="50" x2="59" y2="46" stroke="#5A7A50" stroke-width="1"
        stroke-linecap="round" />
    <line x1="46" y1="62" x2="41" y2="58" stroke="#5A7A50" stroke-width="1"
        stroke-linecap="round" />
    <line x1="54" y1="62" x2="59" y2="58" stroke="#5A7A50" stroke-width="1"
        stroke-linecap="round" />
    <!-- 左臂刺 -->
    <line x1="36" y1="43" x2="33" y2="39" stroke="#5A7A50" stroke-width="1"
        stroke-linecap="round" />
    <!-- 右臂刺 -->
    <line x1="64" y1="36" x2="67" y2="32" stroke="#5A7A50" stroke-width="1"
        stroke-linecap="round" />
    <!-- 顶部小花 -->
    <circle cx="50" cy="26" r="4" fill="#E8C060" stroke="#2A2A2A" stroke-width="1.2" />
    <!-- 盆沿 -->
    <rect x="22" y="76" width="56" height="8" rx="4" fill="#F5F0E8" stroke="#2A2A2A"
        stroke-width="1.8" />
    <!-- 盆身 -->
    <path d="M24 84 L18 116 Q50 124 82 116 L76 84Z" fill="#F5F0E8" stroke="#2A2A2A"
        stroke-width="1.8" stroke-linejoin="round" />
</svg>
