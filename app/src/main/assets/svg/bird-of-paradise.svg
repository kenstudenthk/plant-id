<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 125" fill="none">
    <!-- 天堂鸟 Bird of Paradise - 热带大叶 + 橙花 -->
    <!-- 茎 -->
    <path d="M50 76 Q50 62 50 50" stroke="#2A2A2A" stroke-width="2" stroke-linecap="round" />
    <!-- 左大叶 -->
    <path d="M50 65 Q28 54 12 60 Q6 70 14 76 Q28 78 42 72 Q50 74 50 65Z" fill="#9BB882"
        stroke="#2A2A2A" stroke-width="1.6" />
    <!-- 右大叶 -->
    <path d="M50 70 Q72 58 86 64 Q92 74 84 80 Q70 82 58 76 Q50 74 50 70Z" fill="#9BB882"
        stroke="#2A2A2A" stroke-width="1.6" />
    <!-- 叶脉 -->
    <path d="M38 72 Q32 66 28 60" stroke="#2A2A2A" stroke-width="0.9" stroke-linecap="round"
        opacity="0.5" />
    <path d="M62 76 Q68 70 72 64" stroke="#2A2A2A" stroke-width="0.9" stroke-linecap="round"
        opacity="0.5" />
    <!-- 花茎 -->
    <path d="M50 50 Q54 36 52 24 Q50 14 52 8" stroke="#2A2A2A" stroke-width="1.8"
        stroke-linecap="round" />
    <!-- 橙黄花苞 -->
    <path d="M52 8 Q62 2 66 12 Q60 18 54 14Z" fill="#E8B060" stroke="#2A2A2A" stroke-width="1.4" />
    <path d="M52 8 Q44 2 40 12 Q46 18 52 12Z" fill="#D4904A" stroke="#2A2A2A" stroke-width="1.4" />
    <!-- 蓝色花瓣 -->
    <path d="M52 10 Q56 4 58 10 Q54 14 52 12Z" fill="#8BB0D0" stroke="#2A2A2A" stroke-width="1" />
    <!-- 盆沿 -->
    <rect x="22" y="76" width="56" height="8" rx="4" fill="#F5F0E8" stroke="#2A2A2A"
        stroke-width="1.8" />
    <!-- 盆身 -->
    <path d="M24 84 L18 116 Q50 124 82 116 L76 84Z" fill="#F5F0E8" stroke="#2A2A2A"
        stroke-width="1.8" stroke-linejoin="round" />
</svg>
