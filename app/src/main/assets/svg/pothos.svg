<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 125" fill="none">
    <!-- 绿萝 Pothos - 两片垂坠大叶 -->
    <!-- 茎 -->
    <path d="M50 76 Q42 62 28 46 Q20 34 22 22" stroke="#2A2A2A" stroke-width="1.8"
        stroke-linecap="round" />
    <path d="M50 76 Q58 59 73 44 Q81 31 77 19" stroke="#2A2A2A" stroke-width="1.8"
        stroke-linecap="round" />
    <!-- 左叶 -->
    <path d="M22 22 Q5 11 3 25 Q17 33 27 30 Q33 42 22 22Z" fill="#9BB882" stroke="#2A2A2A"
        stroke-width="1.6" stroke-linejoin="round" />
    <path d="M22 22 Q13 26 7 24" stroke="#2A2A2A" stroke-width="0.9" opacity="0.5" />
    <!-- 右叶 -->
    <path d="M77 19 Q94 7 96 21 Q82 29 72 26 Q67 38 77 19Z" fill="#9BB882" stroke="#2A2A2A"
        stroke-width="1.6" stroke-linejoin="round" />
    <path d="M77 19 Q85 23 91 21" stroke="#2A2A2A" stroke-width="0.9" opacity="0.5" />
    <!-- 小中叶 -->
    <path d="M50 56 Q38 51 30 58 Q28 66 38 68 Q48 69 50 60Z" fill="#B0CC9E" stroke="#2A2A2A"
        stroke-width="1.4" />
    <!-- 盆沿 -->
    <rect x="22" y="76" width="56" height="8" rx="4" fill="#F5F0E8" stroke="#2A2A2A"
        stroke-width="1.8" />
    <!-- 盆身 -->
    <path d="M24 84 L18 116 Q50 124 82 116 L76 84Z" fill="#F5F0E8" stroke="#2A2A2A"
        stroke-width="1.8" stroke-linejoin="round" />
    <!-- 盆纹 -->
    <path d="M32 96 Q50 100 68 96" stroke="#2A2A2A" stroke-width="0.8" opacity="0.18" />
</svg>
