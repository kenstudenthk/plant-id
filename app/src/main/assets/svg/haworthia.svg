    <path d="M43 44 Q50 46 57 44" stroke="#2A2A2A" stroke-width="0.8" opacity="0.4" />
    <path d="M44 32 Q50 34 56 32" stroke="#2A2A2A" stroke-width="0.8" opacity="0.4" />
