<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 125" fill="none">
    <!-- 白鹤芋 Peace Lily - 白色佛焰苞 -->
    <!-- 左叶 -->
    <path d="M50 76 Q40 62 26 50 Q18 40 22 28 Q30 24 36 34 Q44 50 50 62Z" fill="#9BB882"
        stroke="#2A2A2A" stroke-width="1.6" />
    <!-- 右叶 -->
    <path d="M50 76 Q60 62 74 50 Q82 40 78 28 Q70 24 64 34 Q56 50 50 62Z" fill="#9BB882"
        stroke="#2A2A2A" stroke-width="1.6" />
    <!-- 叶脉 -->
    <path d="M50 76 Q40 66 36 56" stroke="#2A2A2A" stroke-width="0.9" stroke-linecap="round"
        opacity="0.4" />
    <path d="M50 76 Q60 66 64 56" stroke="#2A2A2A" stroke-width="0.9" stroke-linecap="round"
        opacity="0.4" />
    <!-- 花茎 -->
    <path d="M50 64 Q50 48 50 34" stroke="#2A2A2A" stroke-width="2" stroke-linecap="round" />
    <!-- 白色佛焰苞 -->
    <path d="M50 34 Q42 26 44 14 Q50 8 56 14 Q58 26 50 34Z" fill="#F8F5EE" stroke="#2A2A2A"
        stroke-width="1.5" />
    <!-- 花中心脉 -->
    <path d="M50 30 Q50 20 50 12" stroke="#2A2A2A" stroke-width="0.8" stroke-linecap="round"
        opacity="0.35" />
    <!-- 花蕊 -->
    <ellipse cx="50" cy="10" rx="3" ry="6" fill="#E8E4DA" stroke="#2A2A2A" stroke-width="1.2" />
    <!-- 盆沿 -->
    <rect x="22" y="76" width="56" height="8" rx="4" fill="#F5F0E8" stroke="#2A2A2A"
        stroke-width="1.8" />
    <!-- 盆身 -->
    <path d="M24 84 L18 116 Q50 124 82 116 L76 84Z" fill="#F5F0E8" stroke="#2A2A2A"
        stroke-width="1.8" stroke-linejoin="round" />
</svg>
