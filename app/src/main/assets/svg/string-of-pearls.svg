<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 125" fill="none">
    <!-- 珍珠吊兰 String of Pearls - 悬挂盆 + 珠串 -->
    <!-- 悬挂盆（位置偏上） -->
    <rect x="26" y="30" width="48" height="7" rx="3.5" fill="#F5F0E8" stroke="#2A2A2A"
        stroke-width="1.8" />
    <path d="M28 37 L24 52 Q50 58 76 52 L72 37Z" fill="#F5F0E8" stroke="#2A2A2A" stroke-width="1.8"
        stroke-linejoin="round" />
    <!-- 土壤/基部植被 -->
    <path d="M32 37 Q50 34 68 37" stroke="#9BB882" stroke-width="2.5" stroke-linecap="round"
        opacity="0.6" />
    <!-- 悬挂绳左 -->
    <path d="M36 52 Q32 68 32 82 Q33 96 35 108" stroke="#2A2A2A" stroke-width="1.4"
        stroke-linecap="round" />
    <!-- 珠串左 -->
    <circle cx="36" cy="56" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="34" cy="64" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="33" cy="72" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="33" cy="80" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="34" cy="88" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="35" cy="96" r="3" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <!-- 悬挂绳中 -->
    <path d="M50 52 Q50 68 50 84 Q50 96 50 110" stroke="#2A2A2A" stroke-width="1.4"
        stroke-linecap="round" />
    <!-- 珠串中 -->
    <circle cx="50" cy="57" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="50" cy="66" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="50" cy="75" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="50" cy="84" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="50" cy="93" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="50" cy="102" r="3" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <!-- 悬挂绳右 -->
    <path d="M64 52 Q68 68 68 82 Q67 96 65 108" stroke="#2A2A2A" stroke-width="1.4"
        stroke-linecap="round" />
    <!-- 珠串右 -->
    <circle cx="64" cy="56" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="66" cy="64" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="67" cy="72" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="67" cy="80" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="66" cy="88" r="3.5" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
    <circle cx="65" cy="96" r="3" fill="#9BB882" stroke="#2A2A2A" stroke-width="1.3" />
</svg>
